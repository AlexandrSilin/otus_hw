<div id="contragent-modal" class="contragent-modal hidden fixed inset-0 z-50 flex items-center justify-center">
    <div class="contragent-modal__backdrop absolute inset-0 bg-gray-900/50" data-modal-cancel></div>
    <div class="relative p-4 w-full max-w-md max-h-full">
        <div class="relative bg-white rounded-lg shadow">
            <div class="flex items-center justify-between p-4 md:p-5 border-b rounded-t border-gray-200">
                <h3 class="text-lg font-semibold text-gray-900">Контрагент</h3>
                <button type="button" class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm w-8 h-8 inline-flex justify-center items-center" data-modal-cancel>
                    <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
                    </svg>
                    <span class="sr-only">Закрыть</span>
                </button>
            </div>
            <form id="contragent-form" class="p-4 md:p-5" novalidate>
                <input type="hidden" id="contragent-id" name="id">
                <div class="grid gap-4 mb-4">
                    <div>
                        <label for="contragent-name" class="block mb-2 text-sm font-medium text-gray-900">Наименование</label>
                        <input type="text" id="contragent-name" name="name" required
                            class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5">
                    </div>
                    <div>
                        <label for="contragent-inn" class="block mb-2 text-sm font-medium text-gray-900">ИНН</label>
                        <input type="text" id="contragent-inn" name="inn" inputmode="numeric" maxlength="11" required
                            class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5">
                        <p id="inn-error" class="mt-1 text-sm text-red-600 hidden"></p>
                    </div>
                    <div>
                        <label for="contragent-address" class="block mb-2 text-sm font-medium text-gray-900">Адрес</label>
                        <input type="text" id="contragent-address" name="address" required
                            class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5">
                    </div>
                    <div>
                        <label for="contragent-kpp" class="block mb-2 text-sm font-medium text-gray-900">КПП</label>
                        <input type="text" id="contragent-kpp" name="kpp" inputmode="numeric" maxlength="9" required
                            class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5">
                        <p id="kpp-error" class="mt-1 text-sm text-red-600 hidden"></p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button type="submit" class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center">
                        Сохранить
                    </button>
                    <button type="button" class="text-gray-900 bg-white border border-gray-300 hover:bg-gray-100 focus:ring-4 focus:outline-none focus:ring-gray-200 font-medium rounded-lg text-sm px-5 py-2.5" data-modal-cancel>
                        Отменить
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
